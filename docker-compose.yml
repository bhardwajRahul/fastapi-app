services:
  app-api:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql+asyncpg://app:app@postgres:5432/app
    volumes:
      - .:/app

  postgres:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
